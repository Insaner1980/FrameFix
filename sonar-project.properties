sonar.projectKey=Insaner1980_FrameFix
sonar.organization=insaner1980

sonar.sources=app/src/main/java
sonar.tests=app/src/test/java
sonar.java.binaries=app/build/intermediates/javac/debug/classes,app/build/intermediates/built_in_kotlinc/debug/compileDebugKotlin/classes
sonar.java.test.binaries=app/build/intermediates/built_in_kotlinc/debugUnitTest/compileDebugUnitTestKotlin/classes

# Exclude generated files from analysis.
sonar.exclusions=**/build/**,**/generated/**

# Exclude generated files from duplication analysis.
sonar.cpd.exclusions=**/build/**,**/generated/**

# JaCoCo XML syntyy taskilla :app:debugUnitTestCoverage ennen Gradlen Sonar-analyysia.
# build.gradle.kts antaa Sonarille absoluuttisen raporttipolun, jotta monimoduuliskanneri ei tulkitse
# app/build-polkuja suhteessa app-moduuliin.

# UI-/entrypoint-reunat rajataan pois portista, kunnes niille on tarkoituksenmukainen testausstrategia.
sonar.coverage.exclusions=**/build/**,**/generated/**,app/src/main/java/com/insaner1980/framefix/MainActivity.kt,app/src/main/java/com/insaner1980/framefix/ui/**,app/src/main/java/com/insaner1980/framefix/ui/theme/**
